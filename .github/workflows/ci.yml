name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  examples-pytest:
    name: pytest (py${{ matrix.python-version }} × aiogram-${{ matrix.aiogram-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        aiogram-version: ["3.13", "3.20", "3.28.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: examples/requirements.txt

      - name: Install pytest + pinned aiogram
        working-directory: examples
        run: |
          python -m pip install -U pip
          pip install "aiogram==${{ matrix.aiogram-version }}" "pytest>=8.0" "pytest-asyncio>=0.23"

      - name: Run pytest
        working-directory: examples
        run: pytest -v

  validate-manifests:
    name: validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json is parseable JSON
        run: |
          python -c "import json; json.load(open('skills/testing-aiogram-bots/.claude-plugin/plugin.json'))"

      - name: Validate marketplace.json is parseable JSON
        run: |
          python -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Cross-check version sync
        run: |
          v_plugin=$(python -c "import json; print(json.load(open('skills/testing-aiogram-bots/.claude-plugin/plugin.json'))['version'])")
          v_mkt=$(python -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          test "$v_plugin" = "$v_mkt" || { echo "::error::version mismatch: plugin.json=$v_plugin vs marketplace=$v_mkt"; exit 1; }
          echo "version $v_plugin in sync"

      - name: Verify mocked_bot.py matches pinned upstream
        run: |
          set -euo pipefail
          pinned=$(grep -oE 'Pinned SHA:\s+[a-f0-9]{40}' skills/testing-aiogram-bots/mocked_bot.py | awk '{print $NF}')
          test -n "$pinned" || { echo "::error::no pinned SHA in mocked_bot.py header"; exit 1; }
          curl -fsSL "https://raw.githubusercontent.com/aiogram/aiogram/${pinned}/tests/mocked_bot.py" -o /tmp/upstream.py
          awk '/--- BEGIN VENDORED CONTENT/{found=1; next} found' skills/testing-aiogram-bots/mocked_bot.py > /tmp/vendored.py
          diff /tmp/upstream.py /tmp/vendored.py || {
            echo "::error::vendored mocked_bot.py drifted from pinned SHA ${pinned}"
            exit 1
          }

  validate-plugin:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code CLI (retry on npm flake)
        run: |
          for i in 1 2 3; do
            npm install -g @anthropic-ai/claude-code && break
            echo "::warning::npm install attempt $i failed, retrying after 10s..."
            sleep 10
          done
      - name: Validate plugin manifest (strict)
        run: claude plugin validate skills/testing-aiogram-bots --strict

  doc-example-sync:
    name: SKILL.md ↔ examples/ sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare key fragments
        run: python scripts/check_doc_sync.py
