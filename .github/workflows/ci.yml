name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  examples-pytest:
    name: pytest examples/
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: examples/requirements.txt

      - name: Install deps
        working-directory: examples
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: examples
        run: pytest -v

  validate-manifests:
    name: validate JSON manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: |
          python -c "import json, sys; json.load(open('skills/testing-aiogram-bots/plugin.json'))"
      - name: Validate marketplace.json
        run: |
          python -c "import json, sys; json.load(open('.claude-plugin/marketplace.json'))"
      - name: Verify mocked_bot.py unchanged from pinned upstream
        run: |
          pinned=$(grep -oE 'Pinned SHA:\s+[a-f0-9]{40}' skills/testing-aiogram-bots/mocked_bot.py | awk '{print $NF}')
          test -n "$pinned" || { echo "no pinned SHA in mocked_bot.py header"; exit 1; }
          curl -fsSL "https://raw.githubusercontent.com/aiogram/aiogram/${pinned}/tests/mocked_bot.py" -o /tmp/upstream.py
          # Skip the pin header (first 13 lines) when comparing
          tail -n +14 skills/testing-aiogram-bots/mocked_bot.py | diff /tmp/upstream.py - || {
            echo "vendored mocked_bot.py drifted from pinned SHA ${pinned}"
            exit 1
          }
